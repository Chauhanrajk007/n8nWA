<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Reminder</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; background:#f4f4f4;}
    .card { background:white; padding:20px; width:320px; margin:auto; border-radius:10px; box-shadow:0 0 10px #ccc;}
    input, button { padding:10px; margin-top:10px; width:90%;}
    button { background:#25D366; color:white; border:none; cursor:pointer;}
    button:hover { background:#1ebe5d;}
    #status { margin-top:15px; font-weight:bold;}
  </style>
</head>
<body>

<div class="card">

<h2>WhatsApp Reminder</h2>

<!-- PHONE -->
<input type="text" id="phone" placeholder="Enter phone (+91...)" />
<button onclick="generateLink()">Continue</button>

<!-- JOIN -->
<div id="step2" style="display:none;">
  <p>👉 Join WhatsApp first:</p>
  <a id="joinLink" target="_blank">Click to Join</a>
  <button onclick="verifyJoin()">I have sent the message</button>
</div>

<!-- TASK -->
<div id="step3" style="display:none;">
  <input type="text" id="task" placeholder="Enter task" />
  <input type="datetime-local" id="time" />
  <button onclick="setReminder()">Set Reminder</button>
</div>

<p id="status"></p>

</div>

<script>
let userPhone = "";
let joined = false;

// STEP 1
function generateLink() {
  userPhone = document.getElementById("phone").value;

  if (!userPhone.startsWith("+")) {
    alert("Enter valid number (+91...)");
    return;
  }

  const link = "https://wa.me/14155238886?text=join%20rate-topic";
  document.getElementById("joinLink").href = link;

  document.getElementById("step2").style.display = "block";
}

// STEP 2
function verifyJoin() {
  joined = true;
  document.getElementById("status").innerText = "✅ Verified!";
  document.getElementById("step3").style.display = "block";
}

// STEP 3
function setReminder() {
  if (!joined) {
    document.getElementById("status").innerText =
      "❌ Please join WhatsApp first.";
    return;
  }

  const task = document.getElementById("task").value;
  const time = document.getElementById("time").value;

  if (!task || !time) {
    alert("Enter task and time");
    return;
  }

  const data = {
    user_phone: userPhone,
    event_name: task,
    event_time: new Date(time).toISOString()
  };

  fetch("https://chauhanrajk.app.n8n.cloud/webhook/reminder", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {
      document.getElementById("status").innerText =
        "🔥 Reminder set successfully!";
    } else {
      document.getElementById("status").innerText =
        "❌ " + res.message;
    }
  })
  .catch(() => {
    document.getElementById("status").innerText =
      "❌ Error. Please join again.";
  });
}
</script>

</body>
</html>
