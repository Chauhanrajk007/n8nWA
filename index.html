<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Reminder System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 90%;
    }
    button {
      background: #25D366;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #1ebe5d;
    }
    a {
      display: inline-block;
      margin-top: 10px;
      color: blue;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="card">

<h2>WhatsApp Reminder</h2>

<!-- STEP 1 -->
<input type="text" id="phone" placeholder="Enter phone (+91...)" />
<button onclick="generateLink()">Continue</button>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
  <p>👉 Join WhatsApp first:</p>
  <a id="joinLink" target="_blank">Click to Join Sandbox</a>
  <button onclick="verifyJoin()">I have sent the message</button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
  <button onclick="setReminder()">Enable Reminder</button>
</div>

<p id="status"></p>

</div>

<script>
let userPhone = "";
let joined = false;

// STEP 1: Generate Join Link
function generateLink() {
  userPhone = document.getElementById("phone").value;

  if (!userPhone.startsWith("+")) {
    alert("Enter valid number with country code (+91...)");
    return;
  }

  // 🔁 IMPORTANT: Replace with YOUR Twilio sandbox number + code
  const link = "https://wa.me/14155238886?text=join%20rate-topic";

  document.getElementById("joinLink").href = link;
  document.getElementById("step2").style.display = "block";

  document.getElementById("status").innerText =
    "👉 Click link and send message to activate.";
}

// STEP 2: Verify Join (Simulated)
function verifyJoin() {
  joined = true;

  document.getElementById("status").innerText =
    "✅ Verified! Now enable reminder.";

  document.getElementById("step3").style.display = "block";
}

// STEP 3: Send Reminder Request
function setReminder() {
  if (!joined) {
    document.getElementById("status").innerText =
      "❌ Please join WhatsApp first.";
    return;
  }

  const data = {
    user_phone: userPhone,
    event_name: "Round 2 Evaluation",
    event_time: new Date(Date.now() + 5 * 60 * 1000).toISOString()
  };

  // 🔥 CALL n8n WEBHOOK
  fetch("https://chauhanrajk.app.n8n.cloud/webhook/reminder", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("status").innerText =
      "🔥 Reminder set! You will get WhatsApp message.";
  })
  .catch(() => {
    document.getElementById("status").innerText =
      "❌ Error. Please join again and retry.";
  });
}
</script>

</body>
</html>
