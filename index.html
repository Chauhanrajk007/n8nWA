<!DOCTYPE html>
<html>
<body>

<h3>WhatsApp Sender</h3>

<input id="phone" placeholder="Enter phone (+91...)" /><br><br>
<input id="message" placeholder="Enter message" /><br><br>

<button onclick="sendMessage()">Send</button>

<p id="status"></p>

<script>
function sendMessage() {
  const phone = document.getElementById("phone").value;
  const message = document.getElementById("message").value;

  if (!phone || !message) {
    document.getElementById("status").innerText = "Enter all fields";
    return;
  }

  fetch("https://chauhanrajk.app.n8n.cloud/webhook/reminder", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_phone: phone,
      event_name: message
    })
  })
  .then(res => res.json())
  .then(res => {
    console.log("Response:", res);

    if (res.status === "success") {
      document.getElementById("status").innerText = "Message sent ✅";
    } 
    else if (res.status === "error") {
      document.getElementById("status").innerText = res.message;

      // redirect ONLY on error
      const link = "https://wa.me/14155238886?text=join%20rate-topic";
      window.open(link, "_blank");
    } 
    else {
      document.getElementById("status").innerText = "Unexpected response";
    }
  })
  .catch(() => {
    document.getElementById("status").innerText = "Error sending message";
  });
}
</script>

</body>
</html>
